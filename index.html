<style>
:root{--bg:#0a0a0f;--card:rgba(255,255,255,.04);--ch:rgba(255,255,255,.07);--bd:rgba(255,255,255,.08);--t:#f0f0f0;--td:rgba(255,255,255,.5);--tm:rgba(255,255,255,.3)}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;min-height:100vh}
.ct{max-width:900px;margin:0 auto;padding:32px 20px}
.hd{text-align:center;margin-bottom:24px}
.badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-family:monospace;margin-bottom:12px}
.hd h1{font-size:clamp(26px,5vw,40px);font-weight:900;font-family:'Playfair Display',Georgia,serif;background:linear-gradient(135deg,#fff,rgba(255,255,255,.55));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;margin-bottom:4px}
.hd p{color:var(--tm);font-size:11px;font-family:monospace}
/* API Key */
.api-box{text-align:center;margin-bottom:20px}
.api-toggle{background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:8px;padding:6px 14px;color:var(--td);font-size:11px;cursor:pointer;font-family:monospace;transition:all .2s}
.api-toggle:hover{background:rgba(255,255,255,.08)}
.api-row{margin-top:8px;display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}
.api-in{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:8px 14px;color:var(--t);font-size:12px;font-family:monospace;width:340px;outline:none}
.api-in:focus{border-color:rgba(255,255,255,.25)}
.api-save{background:rgba(52,199,89,.15);border:1px solid rgba(52,199,89,.3);border-radius:8px;padding:8px 16px;color:#34c759;font-size:12px;font-weight:700;cursor:pointer}
.api-ok{font-size:10px;color:#34c759;margin-top:4px;font-family:monospace}
.api-cost{font-size:10px;color:var(--tm);margin-top:6px;font-family:monospace}
.api-cost a{color:#4da3ff}
/* Pillars */
.pls{display:flex;justify-content:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.pl{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;border:1px solid var(--bd);background:rgba(255,255,255,.03);color:var(--td);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.pl.on{color:#fff;font-weight:700}
/* Country */
.cw{display:flex;justify-content:center;margin-bottom:12px;position:relative}
.cbtn{display:flex;align-items:center;gap:8px;padding:9px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--t);font-size:13px;font-weight:600;cursor:pointer;min-width:200px;justify-content:space-between}
.cdd{position:absolute;top:100%;left:50%;transform:translateX(-50%);width:240px;background:#16161f;border:1px solid rgba(255,255,255,.1);border-radius:10px;max-height:320px;overflow-y:auto;z-index:100;box-shadow:0 16px 48px rgba(0,0,0,.6);margin-top:4px}
.ci{display:flex;align-items:center;gap:8px;width:100%;padding:9px 14px;background:transparent;border:none;color:var(--t);font-size:12px;cursor:pointer;text-align:left}
.ci:hover{background:rgba(255,255,255,.05)}.ci.on{background:rgba(255,255,255,.08)}
/* Subcats */
.scs{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:20px}
.sc{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;border:1px solid var(--bd);background:rgba(255,255,255,.03);color:var(--td);font-size:12px;cursor:pointer;transition:all .2s}
.sc.on{color:#fff;font-weight:700}
/* Button */
.sw{display:flex;justify-content:center;margin-bottom:30px}
.go{padding:13px 40px;border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:8px}
.go:disabled{opacity:.4;cursor:not-allowed}
/* Loading */
.ld{padding:50px 0;text-align:center}
.lb{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:16px;max-width:320px;margin-left:auto;margin-right:auto}
.lf{height:100%;border-radius:2px;transition:width .5s ease}
/* Results */
.rh{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.rh h2{font-size:16px;font-weight:700;font-family:'Playfair Display',serif}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:18px 20px;transition:all .3s;display:flex;flex-direction:column;animation:fi .4s ease both}
.card:hover{background:var(--ch);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.tag{display:inline-block;padding:2px 8px;font-size:9px;font-weight:800;letter-spacing:.08em;color:#fff;border-radius:3px;font-family:monospace;text-transform:uppercase}
.ctag{padding:2px 8px;background:rgba(255,45,85,.1);border:1px solid rgba(255,45,85,.2);border-radius:12px;font-size:11px;color:#ff7a9e;font-weight:600;display:inline-block;margin:0 4px 4px 0}
.card h3{font-size:15px;font-weight:700;color:var(--t);line-height:1.35;font-family:'Playfair Display',serif;margin-bottom:6px}
.card>p{font-size:12.5px;color:var(--td);line-height:1.55}
.hb{margin-top:10px;padding:8px 12px;background:rgba(24,119,242,.07);border:1px solid rgba(24,119,242,.12);border-radius:9px;position:relative}
.src{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;text-decoration:none;transition:all .2s;background:rgba(0,122,255,.08);border:1px solid rgba(0,122,255,.18);color:#6bb5ff}
.src:hover{opacity:.85}
.eb{text-align:center;padding:24px;background:rgba(255,107,107,.06);border-radius:12px;border:1px solid rgba(255,107,107,.12)}
.eb p{color:#ff6b6b;font-size:13px;margin-bottom:8px}
.rb{padding:8px 20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;font-size:12px;cursor:pointer}
.empty{text-align:center;padding:50px 20px;color:var(--tm)}
footer{margin-top:50px;text-align:center;padding:16px 0;border-top:1px solid rgba(255,255,255,.03)}
footer p{font-size:10px;color:rgba(255,255,255,.12);font-family:monospace}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:500px){.grid{grid-template-columns:1fr}}
</style>
</head>

];

/* ══════════════════════════════════════════

var S={
  apiKey:localStorage.getItem("crh_key")||"",
  showApi:false,
  pl:"celebs",sc:"all",ci:0,co:false,
  res:[],ld:false,err:null,srch:false,el:0
};
var tmr=null;
function gc(){return C[S.ci]}
function gp(){for(var i=0;i<PILLARS.length;i++){if(PILLARS[i].id===S.pl)return PILLARS[i]}return PILLARS[0]}
function gs(){if(S.pl==="celebs")return CSUBS;if(S.pl==="tv_shows")return TSUBS;return null}

/* ══════════════════════════════════════════
   PROMPTS
   ══════════════════════════════════════════ */
function buildPrompt(co,pl,sc){
  var lr="ALL text (title, description, hook) MUST be written in "+co.l+". Use the native language of "+co.n+".";
  var base="You are a senior Facebook content researcher for "+co.n+". Search the web thoroughly for the latest trending information.\n\nRULES:\n- "+lr+"\n- Every item MUST have source_url: a REAL working URL from a reputable news source. CRITICAL.\n- Use LOCAL celebrities, LOCAL shows, LOCAL events of "+co.n+".\n- Output ONLY a valid JSON array. No markdown code blocks, no backticks, no explanations.\n- Never refuse. Always provide results.";

  if(pl==="celebs"){
    var m={all:"ALL celebrity life events: marriages, divorces, pregnancies, dating, scandals",marriage:"MARRIAGES and ENGAGEMENTS",divorce:"DIVORCES and BREAKUPS",baby:"PREGNANCIES and BIRTHS",scandal:"SCANDALS and controversies",dating:"NEW RELATIONSHIPS and dating rumors"};
    return base+"\n\nSearch and find TOP 8 most recent celebrity news in "+co.n+" about: "+(m[sc]||m.all)+".\n\nEach JSON object must have:\n- \"title\": headline in "+co.l+", max 15 words\n- \"description\": 2-3 detailed sentences in "+co.l+"\n- \"heat\": number 1-100 (viral potential)\n- \"type\": one of \"breaking\", \"rising\", \"hot\", \"new\"\n- \"celeb_names\": array of celebrity names\n- \"event_type\": one of \"marriage\", \"divorce\", \"baby\", \"scandal\", \"dating\", \"other\"\n- \"source_url\": real URL of the news article\n- \"source_name\": name of the source\n- \"hook\": Facebook post first line in "+co.l+", max 20 words, emotional\n- \"fb_format\": one of \"reel\", \"carousel\", \"discussion\", \"photo\"\n\nOutput ONLY the JSON array:";
  }
  if(pl==="ai_stories"){
    return base+"\n\nSearch for currently viral heartwarming/emotional stories, then generate 8 ORIGINAL story concepts for European Facebook audiences (UK, Germany, France, Italy, Spain, Netherlands, Sweden).\n\nStory types: rescued animal saves owner, elderly kindness, child changes community, lost pet reunion, unlikely friendships, stranger pays it forward, old couple love story.\n\nEach JSON object must have:\n- \"title\": story headline in English, max 15 words\n- \"description\": 3-4 sentence story outline in English\n- \"heat\": number 1-100\n- \"type\": one of \"heartwarming\", \"inspiring\", \"emotional\", \"surprising\", \"reunion\"\n- \"visual_prompt\": 1 sentence for AI cover image\n- \"target_emotion\": one of \"tears\", \"joy\", \"hope\", \"shock\", \"nostalgia\", \"pride\"\n- \"inspired_by\": what real trend inspired this\n- \"inspired_url\": URL of the real viral story if found, or \"\"\n- \"hook\": Facebook caption in English, max 20 words\n- \"fb_format\": one of \"carousel\", \"reel\", \"photo\"\n- \"best_countries\": array of 3-5 EU country codes\n\nOutput ONLY the JSON array:";
  }
  if(pl==="tv_shows"){
    var m2={all_tv:"ALL: reality TV, soap operas, drama series, upcoming premieres, cast news",reality:"REALITY TV shows (dating, competition, talent, lifestyle)",soap:"SOAP OPERAS and long-running daily/weekly dramas",series:"TV SERIES returning with new seasons",upcoming:"UPCOMING TV premieres in the next 1-4 weeks",cast_news:"CAST NEWS: actors joining/leaving, behind-scenes drama"};
    return base+"\n\nSearch and find TOP 8 most recent TV show news in "+co.n+" about: "+(m2[sc]||m2.all_tv)+". Prioritize Reality TV, soap operas, shows with active fan communities.\n\nEach JSON object must have:\n- \"title\": headline in "+co.l+", max 15 words\n- \"description\": 2-3 sentences in "+co.l+" with show name, network, dates\n- \"heat\": number 1-100\n- \"type\": one of \"breaking\", \"rising\", \"hot\", \"new\"\n- \"show_name\": official show name\n- \"network\": network or platform\n- \"show_type\": one of \"reality\", \"soap\", \"drama_series\", \"comedy\", \"competition\", \"documentary\"\n- \"source_url\": real URL\n- \"source_name\": source name\n- \"hook\": Facebook post first line in "+co.l+", max 20 words\n- \"fb_format\": one of \"reel\", \"carousel\", \"discussion\", \"link_post\"\n- \"air_date\": when it airs or \"TBA\"\n\nOutput ONLY the JSON array:";
  }
  return base;
}

function extractJSON(t){
  if(!t)return null;
  var c=t.replace(/```json/gi,"").replace(/```/gi,"").trim();
  try{return JSON.parse(c)}catch(e){}
  var m=c.match(/\[[\s\S]*\]/);
  if(m){try{return JSON.parse(m[0])}catch(e){}}
  var s=c.indexOf("["),e2=c.lastIndexOf("]");
  if(s!==-1&&e2>s){try{return JSON.parse(c.slice(s,e2+1))}catch(e){}}
  return null;
}

/* ══════════════════════════════════════════
   API CALL
   ══════════════════════════════════════════ */
function saveKey(){
  var v=document.getElementById("apiIn").value.trim();
  S.apiKey=v;localStorage.setItem("crh_key",v);S.showApi=false;render();
}

function copyText(text,btnId){
  navigator.clipboard.writeText(text).then(function(){
    var el=document.getElementById(btnId);
    if(el){el.textContent="\u2713";el.style.color="#34c759";setTimeout(function(){el.textContent="Copy";el.style.color=""},1500)}
  });
}
function setPillar(id){S.pl=id;S.sc=(id==="celebs"?"all":id==="tv_shows"?"all_tv":"");S.res=[];S.srch=false;S.err=null;render()}
function setCountry(i){S.ci=i;S.co=false;render()}
function setSub(id){S.sc=id;render()}
function toggleDD(){S.co=!S.co;render()}

async function doSearch(){
  if(!S.apiKey){S.showApi=true;S.err="Vui l\u00F2ng nh\u1EADp API key tr\u01B0\u1EDBc";render();return}
  S.ld=true;S.err=null;S.res=[];S.srch=true;S.el=0;render();
  tmr=setInterval(function(){S.el+=0.5;render()},500);

  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":S.apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:3000,
        system:"You are a JSON API for content research. Output ONLY valid JSON arrays. Never output explanations, apologies, or markdown. Always provide results.",
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:buildPrompt(gc(),S.pl,S.sc)}]
      })
    });
    var data=await res.json();
    if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));

    var fullText=(data.content||[]).filter(function(b){return b.type==="text"}).map(function(b){return b.text}).join("\n");
    var parsed=extractJSON(fullText);
    if(Array.isArray(parsed)&&parsed.length>0){S.res=parsed.slice(0,8)}
    else{S.err="Kh\u00F4ng parse \u0111\u01B0\u1EE3c k\u1EBFt qu\u1EA3. B\u1EA5m Th\u1EED l\u1EA1i."}

    // Token cost estimate
    var u=data.usage||{};
    var cost=((u.input_tokens||0)*0.0008/1000)+((u.output_tokens||0)*0.004/1000);
    S.cost=cost.toFixed(4);
  }catch(e){
    S.err=e.message||"L\u1ED7i k\u1EBFt n\u1ED1i";
  }finally{
    S.ld=false;clearInterval(tmr);render();
  }
}

function render(){

  h+='</header>';

  // API Key
  h+='<div class="api-box">';
  if(S.apiKey&&!S.showApi){
    h+='<button class="api-toggle" onclick="S.showApi=true;render()">\uD83D\uDD11 API Key: ****'+S.apiKey.slice(-6)+' \u00B7 \u0110\u1ED5i key</button>';
    h+='<div class="api-ok">\u2713 \u0110\u00E3 k\u1EBFt n\u1ED1i</div>';
  }else{
    h+='<button class="api-toggle" onclick="S.showApi=!S.showApi;render()">\uD83D\uDD11 '+(S.showApi?'\u1EA8n':'Nh\u1EADp')+' API Key Anthropic</button>';
    if(S.showApi){
      h+='<div class="api-row"><input class="api-in" type="password" placeholder="sk-ant-api03-..." value="'+S.apiKey+'" id="apiIn"><button class="api-save" onclick="saveKey()">L\u01B0u</button></div>';
      h+='<div class="api-cost">\uD83D\uDCB0 ~$0.003-0.005/l\u1EA7n search \u00B7 L\u1EA5y key t\u1EA1i <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a></div>';
    }
  }
  h+='</div>';

  // Pillars
  h+='<div class="pls">';
  for(var i=0;i<PILLARS.length;i++){
    var x=PILLARS[i],on=S.pl===x.id;
    h+='<button class="pl'+(on?" on":"")+'" style="'+(on?"background:"+x.color+"20;border-color:"+x.color+"40":"")+'" onclick="setPillar(\''+x.id+'\')">';
    h+='<span style="font-size:18px">'+x.icon+'</span>';
    h+='<div><div>'+x.label+'</div><div style="font-size:9px;opacity:.5;font-family:monospace">'+x.desc+'</div></div>';
    h+='</button>';
  }
  h+='</div>';

  // Country
  if(showC){
    h+='<div class="cw"><button class="cbtn" onclick="toggleDD()"><span>'+co.f+' '+co.n+'</span><span style="font-size:9px;opacity:.4">\u25BC</span></button>';
    if(S.co){
      h+='<div class="cdd">';
      for(var j=0;j<C.length;j++){
        var c=C[j];
        h+='<button class="ci'+(j===S.ci?" on":"")+'" onclick="setCountry('+j+')"><span style="font-size:16px">'+c.f+'</span>'+c.n;
        if(ET.indexOf(c.c)>=0)h+='<span style="font-size:8px;color:#34c759;font-family:monospace;margin-left:auto">EU T1</span>';
        h+='</button>';
      }
      h+='</div>';
    }
    h+='</div>';
  }

  // Subcats
  if(subs){
    h+='<div class="scs">';
    for(var k=0;k<subs.length;k++){
      var s=subs[k],son=S.sc===s.id;
      h+='<button class="sc'+(son?" on":"")+'" style="'+(son?"background:"+p.color+"20;border-color:"+p.color+"35":"")+'" onclick="setSub(\''+s.id+'\')">';
      h+='<span style="font-size:13px">'+s.i+'</span> '+s.l+'</button>';
    }
    h+='</div>';
  }

  // Search
  h+='<div class="sw"><button class="go" '+(S.ld?"disabled":"")+' style="background:'+(S.ld?"rgba(255,255,255,.05)":"linear-gradient(135deg,"+p.color+","+p.color+"cc)")+';box-shadow:'+(S.ld?"none":"0 4px 20px "+p.color+"40")+'" onclick="doSearch()">';
  h+=(S.ld?"\u0110ang t\u00ECm ki\u1EBFm...":"\uD83D\uDD0D T\u00ECm "+p.label)+'</button></div>';

  // Loading
  if(S.ld){
    var est=45,pct=Math.min((S.el/est)*100,96);
    var steps=["Kh\u1EDFi t\u1EA1o AI...","T\u00ECm ki\u1EBFm web...","\u0110\u1ECDc nhi\u1EC1u ngu\u1ED3n...","Ph\u00E2n t\u00EDch & x\u1EBFp h\u1EA1ng...","T\u1EA1o k\u1EBFt qu\u1EA3..."];
    var si=Math.min(Math.floor((S.el/est)*steps.length),steps.length-1);
    h+='<div class="ld"><div class="lb"><div class="lf" style="width:'+pct+'%;background:linear-gradient(90deg,#cc785c,#ff9500)"></div></div>';
    h+='<p style="color:rgba(255,255,255,.6)">'+steps[si]+'</p>';
    h+='<p style="color:rgba(255,255,255,.25);font-size:11px;font-family:monospace;margin-top:4px">'+Math.round(S.el)+'s / ~'+est+'s \uD83D\uDD0D</p></div>';
  }

  // Error
  if(S.err){
    h+='<div class="eb"><p>\u26A0\uFE0F '+S.err+'</p><button class="rb" onclick="doSearch()">\uD83D\uDD04 Th\u1EED l\u1EA1i</button></div>';
  }

  // Results
  if(!S.ld&&S.res.length>0){
    h+='<div class="rh">';
    if(showC)h+='<span style="font-size:22px">'+co.f+'</span>';
    h+='<span style="font-size:20px">'+p.icon+'</span><div><h2>'+(showC?co.n:"EU Tier 1-2")+' \u00B7 '+p.label+'</h2>';
    h+='<div style="font-size:11px;color:rgba(255,255,255,.3);font-family:monospace">'+S.res.length+' k\u1EBFt qu\u1EA3 \u00B7 Claude Haiku'+(S.cost?' \u00B7 \uD83D\uDCB0 $'+S.cost:'')+'</div></div></div>';
    h+='<div class="grid">';

    for(var ri=0;ri<S.res.length;ri++){
      var it=S.res[ri];
      h+='<div class="card" style="animation-delay:'+ri*0.06+'s;border-color:'+p.color+'18">';
      h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;flex-wrap:wrap;gap:6px">';
      h+='<div style="display:flex;align-items:center;gap:8px">';
      h+='<span style="font-size:18px;font-weight:900;color:rgba(255,255,255,.1);font-family:monospace">'+String(ri+1).padStart(2,"0")+'</span>';

      if(S.pl==="celebs"){
        var ec={marriage:"#34c759",divorce:"#ff6b6b",baby:"#ffb800",scandal:"#ff2d55",dating:"#ff69b4",other:"#888"};
        var el2={marriage:"\uD83D\uDC92 K\u1EBET H\u00D4N",divorce:"\uD83D\uDC94 LY H\u00D4N",baby:"\uD83D\uDC76 SINH CON",scandal:"\uD83D\uDE31 SCANDAL",dating:"\u2764\uFE0F H\u1EB8N H\u00D2",other:"\uD83D\uDCF0 TIN"};
        var et=it.event_type||"other";
        h+='<span class="tag" style="background:'+(ec[et]||"#888")+'">'+(el2[et]||el2.other)+'</span>';
      }else if(S.pl==="tv_shows"){
        var tc2={breaking:"#ff2d55","new":"#5856d6",rising:"#ff9500",hot:"#ff6b35"};
        h+='<span class="tag" style="background:'+(tc2[it.type]||"#ff9500")+'">'+((it.type||"hot").toUpperCase())+'</span>';
        if(it.show_type)h+='<span class="tag" style="background:rgba(255,255,255,.15)">'+it.show_type.replace("_"," ")+'</span>';
      }else{
        var ti2={heartwarming:"\uD83D\uDC96",inspiring:"\uD83C\uDF1F",emotional:"\uD83D\uDE22",surprising:"\uD83D\uDE32",reunion:"\uD83E\uDD1D"};
        h+='<span style="font-size:16px">'+(ti2[it.type]||"\u2728")+'</span>';
        h+='<span class="tag" style="background:#af52de">'+(it.type||"story")+'</span>';
        if(it.target_emotion)h+='<span class="tag" style="background:rgba(255,255,255,.15)">\uD83C\uDFAD '+it.target_emotion+'</span>';
      }
      h+='</div>';
      if(it.network)h+='<span style="font-size:10px;font-weight:700;color:rgba(255,255,255,.5);background:rgba(255,255,255,.06);padding:2px 8px;border-radius:4px;font-family:monospace">'+it.network+'</span>';
      if(it.fb_format)h+='<span class="tag" style="background:rgba(255,255,255,.1)">'+it.fb_format+'</span>';
      h+='</div>';

      if(it.celeb_names&&it.celeb_names.length){h+='<div style="margin-bottom:6px">';for(var cn=0;cn<it.celeb_names.length;cn++)h+='<span class="ctag">'+it.celeb_names[cn]+'</span>';h+='</div>'}
      if(it.show_name)h+='<div style="font-size:11px;font-weight:700;color:#ff9500;font-family:monospace;margin-bottom:4px">\uD83D\uDCFA '+it.show_name+'</div>';
      h+='<h3>'+(it.title||"")+'</h3><p>'+(it.description||"")+'</p>';
      if(it.air_date&&it.air_date!=="TBA")h+='<div style="font-size:11px;color:#34c759;font-family:monospace;margin-top:6px">\uD83D\uDCC5 '+it.air_date+'</div>';
      if(it.visual_prompt)h+='<div style="margin-top:8px;padding:6px 10px;background:rgba(175,82,222,.06);border-radius:8px;font-size:11px;color:rgba(255,255,255,.3);font-family:monospace">\uD83C\uDFA8 '+it.visual_prompt+'</div>';
      if(it.best_countries&&it.best_countries.length){h+='<div style="margin-top:6px;font-size:11px;color:rgba(255,255,255,.3)">\uD83C\uDF0D Best: ';for(var bc=0;bc<it.best_countries.length;bc++){var found=false;for(var fc=0;fc<C.length;fc++){if(C[fc].c===it.best_countries[bc]){h+=C[fc].f+" ";found=true;break}}if(!found)h+=it.best_countries[bc]+" "}h+='</div>'}
      if(it.inspired_by)h+='<div style="margin-top:6px;font-size:11px;color:rgba(255,255,255,.3);font-family:monospace">\uD83D\uDCA1 '+it.inspired_by+'</div>';

      if(it.hook){
        var hid="hook"+ri;
        var safeHook=String(it.hook).replace(/\\/g,"\\\\").replace(/'/g,"\\'");
        h+='<div class="hb">';
        h+='<div style="font-size:8px;font-weight:700;color:#1877f2;text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px;font-family:monospace">HOOK</div>';
        h+='<p style="font-size:12.5px;color:rgba(255,255,255,.75);font-style:italic;line-height:1.4;padding-right:46px">"'+it.hook+'"</p>';
        h+='<button id="'+hid+'" onclick="copyText(\''+safeHook+'\',\''+hid+'\')" style="position:absolute;right:8px;top:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:3px 7px;font-size:10px;color:rgba(255,255,255,.4);cursor:pointer;font-family:monospace">Copy</button>';
        h+='</div>';
      }

      var heat=it.heat||50;
      var hc=heat>80?"#ff2d55":heat>60?"#ff6b35":heat>40?"#ffb800":"#34c759";
      h+='<div style="margin-top:auto;padding-top:6px">';
      h+='<div style="display:flex;align-items:center;gap:8px;margin-top:6px"><div style="flex:1;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden"><div style="width:'+heat+'%;height:100%;background:linear-gradient(90deg,'+hc+'88,'+hc+');border-radius:2px"></div></div><span style="font-size:11px;font-weight:700;font-family:monospace;color:'+hc+'">'+heat+'\u00B0</span></div>';

      var surl=it.source_url||it.inspired_url||"";
      var sname=it.source_name||(it.inspired_url?"Trend g\u1ED1c":"");
      if(surl&&surl.indexOf("http")===0){
        h+='<a class="src" href="'+surl+'" target="_blank" rel="noopener">\uD83D\uDCC4 '+(sname||"Ngu\u1ED3n")+' \u2197</a>';
      }
      h+='</div></div>';
    }
    h+='</div>';
  }

  if(!S.ld&&!S.err&&S.srch&&S.res.length===0)h+='<div class="empty">Kh\u00F4ng t\u00ECm th\u1EA5y. Th\u1EED l\u1EA1i.</div>';
  if(!S.srch&&!S.ld){
    h+='<div class="empty"><div style="font-size:48px;margin-bottom:14px">'+p.icon+'</div>';
    h+='<p style="font-size:14px">'+(S.pl==="ai_stories"?"B\u1EA5m t\u00ECm \u0111\u1EC3 AI g\u1EE3i \u00FD c\u00E2u chuy\u1EC7n viral":"Ch\u1ECDn qu\u1ED1c gia \u2192 danh m\u1EE5c \u2192 b\u1EA5m T\u00ECm")+'</p>';
    h+='<p style="font-size:11px;font-family:monospace;margin-top:4px">Claude Haiku + Web Search \u00B7 ~$0.003/l\u1EA7n \u00B7 ~30-45s</p></div>';
  }
  h+='<footer><p>Content Research Hub \u00B7 Claude AI + Web Search</p></footer>';
  document.getElementById("app").innerHTML=h;
}

document.addEventListener("click",function(e){if(S.co&&!e.target.closest(".cw")){S.co=false;render()}});
render();
</script>
</body>
</html>
